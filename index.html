---
layout: default
---
<main class="projects-list">
    {% for project in site.projects %}
    <a href="{{ project.url | relative_url }}" class="project-row">
        <div class="project-thumb">
            <img src="{{ project.thumb | relative_url }}" alt="{{ project.title }}">
        </div>
        <div class="project-body">
            <h2 class="project-title">{{ project.title }}</h2>
            <p class="project-desc">{{ project.short_desc }}</p>
            <span class="read-more">Read more</span>
        </div>
        <div class="project-meta">
            <span class="project-year">{{ project.year }}</span>
            <span class="project-medium">{{ project.medium }}</span>
        </div>
        <div class="project-icon">{{ project.icon }}</div>
    </a>
    {% endfor %}
</main>
